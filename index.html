<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <style>
        /* ORTAK TEMEL AYARLAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* 1. BÖLÜM: GERÇEKÇİ STANDART FORBIDDEN (0 YÜK - YAZILAR KALDIRILDI) */
        #forbidden-screen {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding-top: 100px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: block;
        }
        #forbidden-screen h1 {
            font-size: 50px;
            margin-bottom: 20px;
            font-weight: normal;
        }
        #forbidden-screen p {
            font-size: 20px;
            margin-bottom: 25px;
        }
        #forbidden-screen hr {
            width: 50%;
            margin: 0 auto 15px auto;
            border: 0;
            border-top: 1px solid #cccccc;
        }
        #forbidden-screen .server-info {
            font-size: 15px;
            color: #333333;
            font-style: italic;
        }

        /* 2. BÖLÜM: ASIL HACKER ANA SİTESİ (TAM EKRAN AFİŞ) */
        #hacker-screen {
            background-color: #000000;
            display: none; /* İlk başta gizli */
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 8888;
        }
        .image-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Gönderdiğin Orijinal Afişi Gösteren Alan */
        .hacked-main-img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            animation: subtle-glitch 2s infinite alternate;
        }
        /* İnce Siber Kırmızı Titreme Efekti */
        @keyframes subtle-glitch {
            0% { filter: drop-shadow(0 0 5px rgba(255,0,0,0.3)); }
            100% { filter: drop-shadow(0 0 15px rgba(255,0,0,0.6)); }
        }
    </style>
</head>
<body>

    <!-- 15 Saniye Bekleten, Sayaçsız Gerçekçi Forbidden Ekranı -->
    <div id="forbidden-screen">
        <h1>Forbidden</h1>
        <p>You don't have permission to access this resource.</p>
        <hr>
        <p class="server-info">Apache/2.4.59 (Ubuntu) Server at anixsenior.com Port 443</p>
    </div>

    <!-- Süre Bitince Açılan Kusursuz Büyük Afiş Ekranı -->
    <div id="hacker-screen">
        <div class="image-wrapper">
            <!-- Gönderdiğin orijinal görsel sisteme eklendi -->
            <img src="https://ibb.co" alt="Hacked Anix" class="hacked-main-img">
        </div>
    </div>

    <!-- SESSİZ ARKA PLAN ZAMANLAYICI MOTORU -->
    <script>
        let timeLeft = 15;
        const forbiddenScreen = document.getElementById('forbidden-screen');
        const hackerScreen = document.getElementById('hacker-screen');

        const countdown = setInterval(() => {
            timeLeft--;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                // Beyaz sahte ekranı tamamen yok et
                forbiddenScreen.style.display = 'none';
                // Büyük afişi tam ekran olarak patlat
                hackerScreen.setAttribute("style", "display: flex !important");
            }
        }, 1000);
    </script>

</body>
</html>
