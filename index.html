<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <style>
        /* GENEL SIFIRLAMA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* 1. SAHTE FORBIDDEN EKRANI (BEYAZ) */
        #forbidden-screen {
            background-color: #ffffff;
            color: #000000;
            text-align: center;
            padding-top: 100px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
        }
        #forbidden-screen h1 {
            font-size: 50px;
            margin-bottom: 20px;
            font-weight: normal;
        }
        #forbidden-screen p {
            font-size: 20px;
            margin-bottom: 25px;
        }
        #forbidden-screen hr {
            width: 50%;
            margin: 0 auto 15px auto;
            border: 0;
            border-top: 1px solid #cccccc;
        }
        #forbidden-screen .server-info {
            font-size: 15px;
            color: #333333;
            font-style: italic;
        }

        /* 2. SİMSİYAH UZAY TEMALI ANA SİTE */
        #hacker-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8888;
            display: none; 
            opacity: 0;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out;
            background-color: #000000; /* İstediğiniz simsiyah dark tema */
        }

        /* DİNAMİK ARKA PLAN ELEMANLARI */
        .space-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        /* YOĞUN PARILDAYAN SİBER YILDIZLAR */
        .stars-layer-1, .stars-layer-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        .stars-layer-1 {
            box-shadow: 
                10vw 15vh 1px #fff, 25vw 35vh 2px #fff, 85vw 20vh 1px #fff,
                45vw 65vh 1.5px #fff, 70vw 80vh 2px #fff, 90vw 75vh 1px #fff,
                30vw 85vh 2px #fff, 60vw 10vh 1px #fff, 15vw 50vh 2.5px #fff;
            animation: starBlink 2s infinite alternate;
        }
        .stars-layer-2 {
            box-shadow: 
                5vw 70vh 1px #88ccff, 40vw 25vh 1px #ffaa99, 75vw 50vh 2px #fff,
                95vw 40vh 1.5px #fff, 50vw 90vh 1px #fff, 80vw 15vh 2px #fff,
                20vw 25vh 1px #fff, 65vw 70vh 1.5px #fff, 85vw 90vh 1px #fff;
            animation: starBlink 3.5s infinite alternate-reverse;
        }

        /* GERÇEKÇİ KOZMİK KARA DELİK */
        .black-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #000000;
            /* Akrepsiyon diski ve gaz bulutu parlaması */
            box-shadow: 
                0 0 30px #000, 
                0 0 60px #ff3300, 
                0 0 110px #ffaa00, 
                0 0 200px rgba(255, 68, 0, 0.4),
                inset 0 0 40px rgba(0,0,0,1);
            animation: holePulse 6s ease-in-out infinite alternate;
        }

        /* DETAYLI GERÇEKÇİ DÜNYA */
        .earth {
            position: absolute;
            bottom: 12%;
            right: 12%;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00bfff 0%, #0055ff 40%, #001144 85%, #000011 100%);
            /* Atmosfer parlaması ve derin gölge */
            box-shadow: 
                0 0 25px rgba(0, 191, 255, 0.45), 
                inset -20px -20px 25px rgba(0,0,0,0.95);
            animation: earthFloat 5s ease-in-out infinite alternate;
        }
        /* Dünya üzerindeki bulutlar ve kıtalar katmanı */
        .earth::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.15) 0%, rgba(0,200,100,0.12) 50%, transparent 100%);
        }

        /* ORTADAKİ KUSURSUZ SİBER YAZI */
        .content-box {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .hacker-title {
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            /* Beyaz Saf Işık Parlaması */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.95), 0 0 35px rgba(255, 255, 255, 0.5);
            animation: textGlow 2.5s infinite alternate;
        }

        /* ANİMASYON DÖNGÜLERİ */
        @keyframes starBlink {
            0% { opacity: 0.2; }
            100% { opacity: 0.9; }
        }
        @keyframes holePulse {
            0% { transform: translate(-50%, -50%) scale(0.98); box-shadow: 0 0 30px #000, 0 0 50px #ff3300, 0 0 90px #ffaa00, 0 0 160px rgba(255, 68, 0, 0.3); }
            100% { transform: translate(-50%, -50%) scale(1.02); box-shadow: 0 0 35px #000, 0 0 70px #ff4400, 0 0 130px #ffbb00, 0 0 240px rgba(255, 68, 0, 0.5); }
        }
        @keyframes earthFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }
        @keyframes textGlow {
            0% { transform: scale(0.98); text-shadow: 0 0 12px rgba(255, 255, 255, 0.8); }
            100% { transform: scale(1.02); text-shadow: 0 0 30px rgba(255, 255, 255, 1); }
        }

        /* MOBİL CİHAZ AYARLARI */
        @media (max-width: 600px) {
            .hacker-title {
                font-size: 2.3rem;
                letter-spacing: 6px;
            }
            .black-hole {
                width: 240px;
                height: 240px;
            }
            .earth {
                width: 65px;
                height: 65px;
                bottom: 15%;
                right: 8%;
            }
        }
    </style>
</head>
<body>

    <!-- 15 SANİYE BEKLETEN BEYAZ FORBIDDEN EKRANI -->
    <div id="forbidden-screen">
        <h1>Forbidden</h1>
        <p>You don't have permission to access this resource.</p>
        <hr>
        <p class="server-info">Apache/2.4.59 (Ubuntu) Server at anixsenior.com Port 443</p>
    </div>

    <!-- SİMSİYAH, GERÇEKÇİ UZAY VE KARA DELİK SİTESİ -->
    <div id="hacker-screen">
        <div class="space-container">
            <div class="stars-layer-1"></div>
            <div class="stars-layer-2"></div>
            <div class="black-hole"></div>
            <div class="earth"></div>
        </div>
        <div class="content-box">
            <h1 class="hacker-title">Anix Hacker</h1>
        </div>
    </div>

    <!-- KESİNTİSİZ GEÇİŞ MOTORU -->
    <script>
        setTimeout(function() {
            var forbidden = document.getElementById('forbidden-screen');
            var hacker = document.getElementById('hacker-screen');
            
            if (forbidden && hacker) {
                forbidden.style.display = 'none';
                hacker.style.display = 'flex';
                setTimeout(function() {
                    hacker.style.opacity = '1';
                }, 50);
            }
        }, 15000); // 15 Saniye
    </script>

</body>
</html>
